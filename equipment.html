    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #f4f6f9;
            min-height: 100vh;
            padding: 24px 16px;
            line-height: 1.5;
            color: #1e2b3c;
        }
        .equipment-card {
            max-width: 700px;
            width: 100%;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        .card {
            background: #ffffff;
            border-radius: 28px;
            padding: 24px 22px;
            box-shadow: 0 12px 28px -12px rgba(0, 20, 30, 0.2);
            border: 1px solid rgba(200, 220, 240, 0.5);
        }
        .card h2 {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #144e75;
            border-bottom: 2px solid #e2eef9;
            padding-bottom: 12px;
        }
        .card h2 i {
            color: #2a7faa;
            font-size: 1.5rem;
            width: 2rem;
            text-align: center;
        }
        .info-row {
            display: flex;
            flex-wrap: wrap;
            margin-bottom: 12px;
            align-items: baseline;
        }
        .info-row strong {
            font-weight: 600;
            color: #2c3e50;
            min-width: 150px;
            padding-right: 12px;
        }
        .info-row span {
            color: #1a2b3c;
            word-break: break-word;
            flex: 1;
        }
        ul {
            list-style: none;
            margin-top: 6px;
        }
        ul li {
            margin-bottom: 14px;
            padding-left: 32px;
            position: relative;
            word-break: break-word;
            font-size: 0.98rem;
        }
        ul li::before {
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
            position: absolute;
            left: 0;
            top: 2px;
            font-size: 1.1rem;
        }
        .checklist-list li::before {
            content: "\f00c";
            color: #2a7faa;
        }
        .hazards-list li::before {
            content: "\f071";
            color: #c44536;
        }
        .safety-list li::before {
            content: "\f058";
            color: #1e7b4c;
        }
        .status-ok {
            display: flex;
            align-items: center;
            gap: 14px;
            background: #e2f3e4;
            border-radius: 60px;
            padding: 14px 20px;
            color: #0f4c2e;
            font-weight: 500;
            border: 1px solid #b8e0be;
            font-size: 1rem;
        }
        .status-ok i {
            font-size: 1.8rem;
            color: #1e9b50;
        }
        .checklist-hint {
            background: #eef2fa;
            border-radius: 24px;
            padding: 12px 18px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #1f6390;
            margin-top: 16px;
        }
        .error-message {
            background: #ffe6e5;
            border-radius: 28px;
            padding: 28px 24px;
            text-align: center;
            color: #b13e3e;
        }
        .error-message i {
            font-size: 3rem;
            margin-bottom: 12px;
            display: block;
        }
        .footer-note {
            text-align: center;
            color: #7c8faa;
            font-size: 0.8rem;
            padding: 16px 8px 8px;
            border-top: 1px solid #e2eef9;
            margin-top: 8px;
        }
        @media (max-width: 520px) {
            body { padding: 16px 12px; }
            .card { padding: 20px 18px; }
            .card h2 { font-size: 1.25rem; }
            .info-row strong { min-width: 110px; }
        }
    </style>
</head>

    function parseListItems(str) {
        if (!str) return [];
        const regex = /\d+\)\s*([^1-9][^)]*(?=\s*\d+\)|$))/g;
        const matches = [];
        let match;
        while ((match = regex.exec(str)) !== null) {
            matches.push(match[1].trim());
        }
        if (matches.length === 0 && str.includes(";")) {
            return str.split(";").map(s => s.trim());
        }
        if (matches.length === 0 && str.trim()) {
            return [str.trim()];
        }
        return matches;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

                <div class="info-row">

                </div>

                <div class="info-row">

                <ul class="checklist-list">

                </ul>

                    <span>Перед запуском обязательно выполните указанные проверки.</span>
                </div>
            </div>

            <div class="card">
                <h2><i class="fas fa-clipboard-check"></i> Допуск</h2>
                <div class="status-ok">

                </div>
            </div>

            <div class="card">
                <h2><i class="fas fa-exclamation-triangle"></i> Возможные опасности</h2>
                <ul class="hazards-list">
                    ${hazardsItems.map(li => `<li>${escapeHtml(li)}</li>`).join('')}
                </ul>
                <div style="margin-top: 14px; background: #fff1e0; border-radius: 20px; padding: 10px 18px; font-size:0.9rem;">
                    <i class="fas fa-ear-deaf" style="margin-right: 10px; color:#b13e3e;"></i> Обязательно используйте СИЗ при работе

                    ${safetyItems.map(li => `<li>${escapeHtml(li)}</li>`).join('')}

        `;

    function showError() {
        document.getElementById('dynamicContent').innerHTML = `
            <div class="card error-message">
                <i class="fas fa-exclamation-triangle"></i>
                <strong>Оборудование не найдено</strong><br>
                Проверьте инвентарный номер в ссылке или обратитесь к администратору.
            </div>
        `;
    }

    function init() {
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');
        if (!id) {
            showError();
            return;
        }
        const found = equipmentData.find(eq => eq.invNumber === id);
        if (!found) {
            showError();
            return;
        }
        document.getElementById('dynamicContent').innerHTML = renderEquipment(found);
    }

    init();
